services:
  postgres:
    image: postgres:16-alpine
    container_name: client-review-prep-postgres
    environment:
      POSTGRES_DB: client_review_prep
      POSTGRES_USER: client_review
      POSTGRES_PASSWORD: local_demo_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - client-review-prep-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U client_review -d client_review_prep"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  client-review-prep-postgres-data:
