name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://client_review:ci_password@localhost:5432/client_review_prep_test?schema=public
      TEST_DATABASE_URL: postgresql://client_review:ci_password@localhost:5432/client_review_prep_test?schema=public

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: client_review
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: client_review_prep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U client_review -d client_review_prep_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate -w apps/api

      - name: Apply database migrations
        run: npm run prisma:deploy -w apps/api

      - name: Run lint
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Run PostgreSQL integration tests
        run: npm run test:integration

      - name: Run production build
        run: npm run build
